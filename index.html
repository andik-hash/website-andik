<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Cewek Lucu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>🌸 Form Khusus Cewek Gemoy 🌸</h1>
    <p>Isi dengan jujur, CCTV hati aktif 24 jam 👀💖</p>

    <form>
        <label>Nama cantik kamu:</label>
        <input type="text" placeholder="Contoh: Putri Bidadari">

        <label>Tingkat kecantikan:</label>
        <select>
            <option>100%</option>
            <option>1000%</option>
            <option>Tak terhitung 😎</option>
        </select>

        <label>Kalau lagi sedih biasanya:</label>
        <input type="text" placeholder="Makan, tidur, galau?">

        <label>Pilih satu:</label>
        <input type="radio" name="pilihan"> Mau traktir aku <br>
        <input type="radio" name="pilihan"> Mau ditraktir aku 🤣

        <label>Pesan rahasia:</label>
        <textarea placeholder="Tulis isi hati..."></textarea>

        <button>Kirim 💕</button>
    </form>

    <div class="quote">
        "Kamu itu kayak WiFi... pas dekat hati langsung nyambung 📶❤️"
    </div>
</div>

</body>
</html>
